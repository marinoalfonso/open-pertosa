global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'pertosa-rag-api'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'

  - job_name: 'qdrant'
    static_configs:
      - targets: ['host.docker.internal:6333']
    metrics_path: '/metrics'

  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']