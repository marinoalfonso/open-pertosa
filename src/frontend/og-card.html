<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>OG Card - Open Pertosa</title>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&family=Source+Serif+4:wght@500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
      font-family: 'Titillium Web', sans-serif;
    }

    /* La card vera e propria - 1200x630 dimensioni esatte OG */
    .card {
      width: 1200px;
      height: 630px;
      background: #FFFFFF;
      display: flex;
      align-items: center;
      padding: 80px;
      gap: 70px;
      position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    /* Banda blu istituzionale a sinistra */
    .card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 12px;
      background: #14377D;
    }

    /* Decorazione: cerchio sfumato in basso a destra */
    .card::after {
      content: '';
      position: absolute;
      right: -150px;
      bottom: -150px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(20, 55, 125, 0.06) 0%, transparent 70%);
    }

    .logo-area {
      flex-shrink: 0;
    }

    .logo-area img {
      width: 240px;
      height: 240px;
      object-fit: contain;
    }

    .text-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .title {
      font-family: 'Source Serif 4', serif;
      font-size: 84px;
      font-weight: 600;
      color: #14377D;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 32px;
      font-weight: 400;
      color: #4A5468;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .divider {
      width: 80px;
      height: 3px;
      background: #14377D;
      border-radius: 2px;
    }

    .description {
      font-size: 26px;
      font-weight: 400;
      color: #0A1F4A;
      line-height: 1.45;
      max-width: 560px;
    }

    .footer {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      color: #6B7280;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .footer-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #14377D;
    }

    /* Istruzioni sopra la card */
    .instructions {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 100;
      max-width: 90%;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="instructions">
    Fai uno screenshot della card sotto a 1200×630. Su Mac: <strong>Cmd+Shift+4</strong> e seleziona l'area bianca della card.
  </div>

  <div class="card">
    <div class="logo-area">
      <img src="logo-pertosa.png" alt="Stemma Comune di Pertosa">
    </div>

    <div class="text-area">
      <h1 class="title">Open Pertosa</h1>
      <p class="subtitle">Assistente Documentale</p>
      <div class="divider"></div>
      <p class="description">
        Consulta bilanci, delibere e atti ufficiali del Comune in linguaggio naturale.
      </p>
      <div class="footer">
        Comune di Pertosa
      </div>
    </div>
  </div>

</body>
</html>
